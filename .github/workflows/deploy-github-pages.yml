name: Deploy live site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Static export: API routes & middleware are not supported on GitHub Pages
      - name: Prepare static storefront build
        run: |
          if [ -f src/middleware.ts ]; then mv src/middleware.ts src/middleware.ts.bak; fi
          rm -rf src/app/api src/app/admin

      - name: Build site
        env:
          GITHUB_PAGES: 'true'
          DATABASE_URL: 'file:./prisma/dev.db'
          NEXTAUTH_SECRET: 'github-pages-build-placeholder'
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
